name: Release Closit

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Install xcodegen
        run: brew install xcodegen
        
      - name: Check Secrets and Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Skipping Code Signing because secrets are not set (e.g. Forked repo)."
            echo "SHOULD_SIGN=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "SHOULD_SIGN=true" >> $GITHUB_ENV
          
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.provisionprofile
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # Use macOS standard partition to unlock keychain for codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          echo "=== IMPORTED IDENTITIES ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "==========================="
          
          CERT_HASH=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep -o '[0-9A-F]\{40\}' | head -n 1)
          echo "APPLE_CERT_HASH=$CERT_HASH" >> $GITHUB_ENV
          
          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          
          # extract Team ID and Provisioning Profile UUID
          TEAM_ID=$(security cms -D -i $PP_PATH | plutil -extract TeamIdentifier.0 raw -)
          PROFILE_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "APPLE_TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build and Prepare Release
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          if [ "$SHOULD_SIGN" = "true" ]; then
            echo "Building with Code Signing..."
          else
            echo "Building without Code Signing..."
            # Provide environment variables to xcodebuild to disable signing
            export CODE_SIGN_IDENTITY=""
            export CODE_SIGNING_REQUIRED="NO"
            export CODE_SIGN_ENTITLEMENTS=""
            export CODE_SIGNING_ALLOWED="NO"
          fi
          chmod +x ./scripts/prepare_release.sh
          ./scripts/prepare_release.sh
          
      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          fi
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.provisionprofile
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Closit.dmg
            dist/appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare pages deployment
        run: |
          mkdir -p public_pages
          cp dist/appcast.xml public_pages/
          
      - name: Deploy appcast.xml to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_pages
          keep_files: true
